<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presentation Generator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header>
      <h1>Presentation Generator</h1>
      <p>Create slide outlines with a simple frontend and Node/Express backend.</p>
    </header>

    <main>
      <form id="generator-form">
        <label for="topic">Presentation topic</label>
        <input id="topic" name="topic" type="text" placeholder="e.g. AI in Film" required />

        <label for="slides">Number of slides</label>
        <input id="slides" name="slides" type="number" min="3" max="15" value="6" />

        <button type="submit">Generate Outline</button>
      </form>

      <section id="output" class="output hidden">
        <h2>Generated Outline</h2>
        <div id="outline"></div>
      </section>

      <div id="status" class="status"></div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
